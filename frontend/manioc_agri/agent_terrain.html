<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent de Terrain - ManiocAgri</title>
    <link href="../bootstrap-5.3.8-dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../style.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body>
    <!-- Preloader -->
    <div id="preloader">
        <div class="loader-spinner"></div>
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top navbar-solid">
        <div class="container">
            <a class="navbar-brand" href="#">ManiocAgri - Agent de Terrain</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="logoutBtn">Déconnexion</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5" style="margin-top: 70px;">
        <h2>Saisie des Données de Terrain</h2>
        <div class="card mb-4">
            <div class="card-header">
                <h5>Données du champ</h5>
            </div>
            <div class="card-body">
                <form id="fieldForm">
                    <div class="row">
                        <div class="col-md-4">
                            <label for="fieldLocation" class="form-label">Localisation du champ</label>
                            <input type="text" class="form-control" id="fieldLocation" required>
                        </div>
                        <div class="col-md-4">
                            <label for="fieldSize" class="form-label">Taille du champ (hectares)</label>
                            <input type="number" class="form-control" id="fieldSize" step="0.01" required>
                        </div>
                        <div class="col-md-4">
                            <label for="season" class="form-label">Saison</label>
                            <select class="form-select" id="season" required>
                                <option value="sèche">Saison sèche</option>
                                <option value="pluvieuse">Saison pluvieuse</option>
                            </select>
                        </div>
                    </div>
                    <div class="row mt-3">
                        <div class="col-md-4">
                            <label for="soilType" class="form-label">Type de sol</label>
                            <input type="text" class="form-control" id="soilType" required>
                        </div>
                        <div class="col-md-4">
                            <label for="plantingDate" class="form-label">Date de plantation</label>
                            <input type="date" class="form-control" id="plantingDate" required>
                        </div>
                        <div class="col-md-4">
                            <label for="expectedHarvest" class="form-label">Récolte attendue (kg)</label>
                            <input type="number" class="form-control" id="expectedHarvest" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success mt-3">Enregistrer</button>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h5>Historique des données</h5>
            </div>
            <div class="card-body">
                <div id="fieldDataList">
                    <!-- Liste des données saisies -->
                </div>
            </div>
        </div>
    </div>
    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <p>&copy; 2026 ManiocAgri. Tous droits réservés.</p>
        </div>
    </footer>
    <script src="../bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- ============================================
         Chat IA Flotant - Bouton et Panneau
         ============================================ -->

    <!-- Panneau de chat (caché par défaut) -->
    <div id="chat-panel" class="hidden" role="dialog" aria-label="Assistant IA ManiocAgri">
        <!-- Header -->
        <div class="chat-header">
            <div class="chat-avatar">🌿</div>
            <div class="chat-info">
                <h6>Assistant ManiocAgri</h6>
                <small><span class="status-dot"></span>En ligne • IA</small>
            </div>
            <button class="chat-close-btn" id="chat-close-btn" aria-label="Fermer le chat">&times;</button>
        </div>
        <!-- Zone de messages -->
        <div id="chat-messages">
            <!-- Message de bienvenue -->
            <div class="msg-bubble bot">
                👋 Bonjour ! Je suis l'assistant AI de ManiocAgri. Comment puis-je vous aider aujourd'hui ?
            </div>
        </div>
        <!-- Input -->
        <div class="chat-input-zone">
            <input type="text" id="chat-input" placeholder="Posez votre question..." autocomplete="off" maxlength="500">
            <button class="chat-send-btn" id="chat-send-btn" aria-label="Envoyer">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <!-- Bouton Chat Flottant -->
    <button id="chat-fab" aria-label="Ouvrir le chat IA">
        <span class="chat-badge"></span>
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
    </button>
<script src="../script.js"></script>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            AOS.init({
                duration: 800,
                once: true,
                offset: 50
            });
            // Hide preloader
            const preloader = document.getElementById('preloader');
            if (preloader) {
                setTimeout(() => {
                    preloader.classList.add('hidden');
                    setTimeout(() => preloader.remove(), 600);
                }, 500); // Small artificial delay for premium feel
            }
        });
    </script>
</body>

</html>
