<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails du Produit - ManiocAgri</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="bootstrap-5.3.8-dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body>
    <!-- Preloader -->
    <div id="preloader">
        <div class="loader-spinner"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top navbar-solid">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">ManiocAgri</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="catalogue.html">Retour au Catalogue</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-outline-light btn-sm px-4 ms-2" href="index.html">Accueil</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Product Details Section -->
    <section class="py-5" style="margin-top: 80px;">
        <div class="container py-4">
            <div id="product-details-container" class="row gx-5 align-items-center">
                <!-- Loading State -->
                <div class="col-12 text-center py-5">
                    <div class="spinner-border text-success" role="status">
                        <span class="visually-hidden">Chargement...</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white py-5 mt-auto">
        <div class="container text-center">
            <p class="mb-0 opacity-75">&copy; 2026 ManiocAgri. Tous droits réservés.</p>
        </div>
    </footer>

    <script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- ============================================
         Chat IA Flotant - Bouton et Panneau
         ============================================ -->

    <!-- Panneau de chat (caché par défaut) -->
    <div id="chat-panel" class="hidden" role="dialog" aria-label="Assistant IA ManiocAgri">
        <!-- Header -->
        <div class="chat-header">
            <div class="chat-avatar">🌿</div>
            <div class="chat-info">
                <h6>Assistant ManiocAgri</h6>
                <small><span class="status-dot"></span>En ligne • IA</small>
            </div>
            <button class="chat-close-btn" id="chat-close-btn" aria-label="Fermer le chat">&times;</button>
        </div>
        <!-- Zone de messages -->
        <div id="chat-messages">
            <!-- Message de bienvenue -->
            <div class="msg-bubble bot">
                👋 Bonjour ! Je suis l'assistant AI de ManiocAgri. Comment puis-je vous aider aujourd'hui ?
            </div>
        </div>
        <!-- Input -->
        <div class="chat-input-zone">
            <input type="text" id="chat-input" placeholder="Posez votre question..." autocomplete="off" maxlength="500">
            <button class="chat-send-btn" id="chat-send-btn" aria-label="Envoyer">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <!-- Bouton Chat Flottant -->
    <button id="chat-fab" aria-label="Ouvrir le chat IA">
        <span class="chat-badge"></span>
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
    </button>
<script src="script.js"></script>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            AOS.init({
                duration: 800,
                once: true,
                offset: 50
            });
            // Hide preloader
            const preloader = document.getElementById('preloader');
            if (preloader) {
                setTimeout(() => {
                    preloader.classList.add('hidden');
                    setTimeout(() => preloader.remove(), 600);
                }, 500); // Small artificial delay for premium feel
            }
        });
    </script>
</body>

</html>
